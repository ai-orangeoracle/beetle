// 飞书长连接 WebSocket 帧格式，与 larksuite/oapi-sdk-python lark_oapi/ws/pb/pbbp2_pb2 一致。
// 字段号必须与服务端一致，否则无法解析。
syntax = "proto3";
package pbbp2;

message Header {
  string key = 1;
  string value = 2;
}

message Frame {
  uint64 seq_id = 1;   // SeqID
  uint64 log_id = 2;   // LogID
  int32 service = 3;
  int32 method = 4;    // FrameType: 0=CONTROL, 1=DATA
  repeated Header headers = 5;
  string payload_encoding = 6;
  string payload_type = 7;
  bytes payload = 8;
  string log_id_new = 9;  // LogIDNew
}
