<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WiFi 配置 - beetle</title>
<link rel="stylesheet" href="/common.css"/>
</head>
<body class="has-sidebar" data-subtitle="WiFi 配置">
<div class="app-body">
<nav class="app-nav" id="app-nav"></nav>
<main class="main">
  <div class="card">
    <div class="card-hd"><h2 data-i18n="wifi_h2"></h2></div>
    <div class="card-bd">
    <div class="field">
      <label for="ssid" data-i18n="wifi_ssid_label"></label>
      <input type="text" id="ssid" maxlength="64" data-i18n-ph="wifi_ssid_ph"/>
    </div>
    <div class="field">
      <label for="pass" data-i18n="wifi_pass_label"></label>
      <input type="password" id="pass" maxlength="64" data-i18n-ph="wifi_pass_ph"/>
    </div>
    <div class="btns">
      <button id="btnSave" data-i18n="wifi_save"></button>
      <button id="btnRestart" class="secondary" data-i18n="wifi_restart"></button>
    </div>
    <div id="formMsg" class="msg"></div>
    </div>
  </div>
</main>
</div>
<script src="/common.js"></script>
<script>
(function(){
  var B=PC.BASE,formMsg=document.getElementById('formMsg'),ssid=document.getElementById('ssid'),pass=document.getElementById('pass');
  fetch(B+'/api/pairing_code').then(function(r){ return r.json(); })
    .then(function(j){ if(j.locale)PC.setLocale(j.locale); if(!j.code_set){ location.href=B+'/pairing'; return; } return fetch(B+'/api/config').then(function(r){ if(!r.ok){ location.href=B+'/pairing'; return null; } return r.json(); }); })
    .then(function(j){ if(j&&j.wifi_ssid)ssid.value=j.wifi_ssid; })
    .catch(function(){ location.href=B+'/pairing'; });
  document.getElementById('btnSave').onclick=function(){
    PC.requestWithCode('POST','/api/config/wifi',JSON.stringify({wifi_ssid:(ssid.value||'').trim(),wifi_pass:pass.value}),function(x){
      if(x.ok&&x.j.ok)PC.showMsg(formMsg,PC.t('wifi_saved_msg'),false);
      else PC.showMsg(formMsg,(x.j&&x.j.error)||PC.t('wifi_save_fail'),true);
    });
  };
  document.getElementById('btnRestart').onclick=function(){
    PC.requestWithCode('POST','/api/restart',null,function(x){
      if(x.j&&x.j.ok)PC.showMsg(formMsg,PC.t('wifi_restarting'),false);
      else PC.showMsg(formMsg,(x.j&&x.j.error)||PC.t('wifi_restart_fail'),true);
    });
  };
})();
</script>
</body>
</html>
