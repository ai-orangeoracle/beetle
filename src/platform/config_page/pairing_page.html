<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>配对码设置 - beetle</title>
<link rel="stylesheet" href="/common.css"/>
</head>
<body data-subtitle="配对码设置">
<main class="main">
  <div class="card">
    <div class="card-hd"><h2 data-i18n="pairing_h2"></h2></div>
    <div class="card-bd">
    <p class="card-desc" data-i18n="pairing_desc"></p>
    <div class="field">
      <label for="codeIn" data-i18n="pairing_label"></label>
      <input type="text" id="codeIn" maxlength="6" data-i18n-ph="pairing_ph" inputmode="numeric" pattern="[0-9]*"/>
    </div>
    <div class="btns"><button id="btnSet" data-i18n="pairing_btn"></button></div>
    <div id="msg" class="msg"></div>
    </div>
  </div>
</main>
<script src="/common.js"></script>
<script>
(function(){
  if(typeof PC==='undefined'){ document.getElementById('msg').textContent='请通过配置页地址访问（common.js 未加载）'; document.getElementById('msg').className='msg err'; return; }
  var B=PC.BASE,msgEl=document.getElementById('msg');
  fetch(B+'/api/pairing_code').then(function(r){ return r.json(); }).then(function(j){
    if(j.locale)PC.setLocale(j.locale);
    if(j.code_set)location.href=B+'/wifi';
  }).catch(function(){});
  document.getElementById('btnSet').onclick=function(){
    var code=(document.getElementById('codeIn').value||'').trim();
    if(code.length!==6||!/^\d+$/.test(code)){ PC.showMsg(msgEl,PC.t('pairing_msg_6digits'),true); return; }
    var btn=this; btn.disabled=true; msgEl.style.display='none';
    fetch(B+'/api/pairing_code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})})
      .then(function(r){ return r.json(); })
      .then(function(j){ if(j.ok)location.href=B+'/wifi'; else PC.showMsg(msgEl,j.error||PC.t('pairing_fail'),true); })
      .catch(function(){ PC.showMsg(msgEl,PC.t('pairing_network'),true); })
      .then(function(){ btn.disabled=false; });
  };
})();
</script>
</body>
</html>
