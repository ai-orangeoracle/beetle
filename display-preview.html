<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Beetle Icons Preview v3</title>
<style>
  body { background: #1a1a2e; display: flex; flex-wrap: wrap; gap: 32px; padding: 32px; font-family: monospace; }
  .card { text-align: center; }
  .card canvas { border: 1px solid #333; border-radius: 8px; }
  .card p { color: #aaa; margin-top: 8px; font-size: 14px; }
</style>
</head>
<body>

<div class="card"><canvas id="wifi" width="128" height="128"></canvas><p>Booting / NoWifi</p></div>
<div class="card"><canvas id="idle" width="128" height="128"></canvas><p>Idle (Free)</p></div>
<div class="card"><canvas id="busy" width="128" height="128"></canvas><p>Busy</p></div>
<div class="card"><canvas id="fault" width="128" height="128"></canvas><p>Fault (Bug)</p></div>

<script>
function drawBeetle(ctx, x, y, size, color, opts = {}) {
  const cx = x + size / 2;
  const flipped = opts.flipped || false;
  const dir = flipped ? -1 : 1;

  // 甲壳虫比例：大圆身体 + 小圆头
  const bodyR = size * 0.28;          // 身体半径（圆润）
  const headR = size * 0.10;          // 头小
  const headCy = flipped ? (y + size * 0.72) : (y + size * 0.30);
  const bodyCy = flipped ? (y + size * 0.40) : (y + size * 0.62);

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // --- 触角（短，末端棒状/锤状） ---
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.fillStyle = color;
  // 左触角：短弧线
  ctx.beginPath();
  ctx.moveTo(cx - headR * 0.5, headCy - dir * headR * 0.8);
  ctx.quadraticCurveTo(
    cx - size * 0.14, headCy - dir * size * 0.14,
    cx - size * 0.20, headCy - dir * size * 0.20
  );
  ctx.stroke();
  // 左触角锤头
  ctx.beginPath();
  ctx.ellipse(cx - size * 0.20, headCy - dir * size * 0.20, 4, 2.5, flipped ? 0.5 : -0.5, 0, Math.PI * 2);
  ctx.fill();
  // 右触角
  ctx.beginPath();
  ctx.moveTo(cx + headR * 0.5, headCy - dir * headR * 0.8);
  ctx.quadraticCurveTo(
    cx + size * 0.14, headCy - dir * size * 0.14,
    cx + size * 0.20, headCy - dir * size * 0.20
  );
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx + size * 0.20, headCy - dir * size * 0.20, 4, 2.5, flipped ? -0.5 : 0.5, 0, Math.PI * 2);
  ctx.fill();

  // --- 腿（短粗，3 对，微弯） ---
  ctx.lineWidth = 2.5;
  const legPairs = [
    { attachFrac: -0.25, angle: -20, len1: size * 0.10, len2: size * 0.07 },
    { attachFrac:  0.00, angle:   5, len1: size * 0.11, len2: size * 0.08 },
    { attachFrac:  0.25, angle:  25, len1: size * 0.10, len2: size * 0.07 },
  ];
  for (const lp of legPairs) {
    const legY = bodyCy + bodyR * lp.attachFrac;
    const ang = lp.angle * Math.PI / 180 * dir;
    for (const side of [-1, 1]) {
      const ax = cx + side * bodyR * 0.95;
      const kx = ax + side * lp.len1 * Math.cos(ang);
      const ky = legY + lp.len1 * Math.sin(ang);
      const fx = kx + side * lp.len2 * 0.5;
      const fy = ky + lp.len2 * 0.9 * dir;
      ctx.beginPath();
      ctx.moveTo(ax, legY);
      ctx.lineTo(kx, ky);
      ctx.lineTo(fx, fy);
      ctx.stroke();
    }
  }

  // --- 翅膀（展开时） ---
  if (opts.wings) {
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    // 左翅（椭圆，从身体侧面展开，微微倾斜）
    ctx.beginPath();
    ctx.ellipse(cx - bodyR - size * 0.10, bodyCy - bodyR * 0.15, size * 0.16, bodyR * 0.75, -0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.stroke();
    // 右翅
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.ellipse(cx + bodyR + size * 0.10, bodyCy - bodyR * 0.15, size * 0.16, bodyR * 0.75, 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.stroke();
    ctx.restore();
  }

  // --- 身体（大圆，甲壳虫标志性穹顶） ---
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(cx, bodyCy, bodyR, 0, Math.PI * 2);
  ctx.fill();

  // 鞘翅缝（中线）
  ctx.strokeStyle = darken(color, 50);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx, bodyCy - bodyR + 3);
  ctx.lineTo(cx, bodyCy + bodyR - 3);
  ctx.stroke();

  // 鞘翅光泽弧线（左右各一条高光）
  ctx.strokeStyle = lighten(color, 40);
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  // 左高光
  ctx.beginPath();
  ctx.arc(cx - bodyR * 0.35, bodyCy - bodyR * 0.1, bodyR * 0.55, -Math.PI * 0.7, -Math.PI * 0.15);
  ctx.stroke();
  // 右高光
  ctx.beginPath();
  ctx.arc(cx + bodyR * 0.35, bodyCy - bodyR * 0.1, bodyR * 0.55, -Math.PI * 0.85, -Math.PI * 0.3);
  ctx.stroke();
  ctx.globalAlpha = 1.0;

  // --- 头（小圆） ---
  ctx.fillStyle = darken(color, 20);
  ctx.beginPath();
  ctx.arc(cx, headCy, headR, 0, Math.PI * 2);
  ctx.fill();

  // --- 眼睛 ---
  const eyeSpread = headR * 0.6;
  const eyeY = headCy - dir * 1;
  if (opts.eyes === 'x') {
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    for (const sx of [-1, 1]) {
      const ex = cx + sx * eyeSpread;
      ctx.beginPath();
      ctx.moveTo(ex - 2.5, eyeY - 2.5);
      ctx.lineTo(ex + 2.5, eyeY + 2.5);
      ctx.moveTo(ex + 2.5, eyeY - 2.5);
      ctx.lineTo(ex - 2.5, eyeY + 2.5);
      ctx.stroke();
    }
  } else {
    ctx.fillStyle = '#ffffff';
    for (const sx of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(cx + sx * eyeSpread, eyeY, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#111';
    for (const sx of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(cx + sx * eyeSpread + 0.5, eyeY + 0.5, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  return { cx, headCy: headCy, bodyCy, bodyR, headR };
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

// --- WiFi ---
(function() {
  const c = document.getElementById('wifi');
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3a3a50';
  ctx.fillRect(0, 0, 128, 128);
  const color = '#d4a017';
  const { cx, headCy, headR } = drawBeetle(ctx, 0, 8, 120, color);
  // WiFi 信号弧
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  const sigY = headCy - headR - 4;
  for (const r of [9, 17]) {
    ctx.beginPath();
    ctx.arc(cx, sigY, r, -Math.PI * 0.82, -Math.PI * 0.18);
    ctx.stroke();
  }
})();

// --- Idle ---
(function() {
  const c = document.getElementById('idle');
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(0, 0, 128, 128);
  const color = '#22cc22';
  const { cx, bodyCy } = drawBeetle(ctx, 0, 8, 120, color);
  // 白色对勾
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const m = 10;
  ctx.beginPath();
  ctx.moveTo(cx - m, bodyCy);
  ctx.lineTo(cx - 2, bodyCy + m * 0.7);
  ctx.lineTo(cx + m, bodyCy - m * 0.5);
  ctx.stroke();
})();

// --- Busy ---
(function() {
  const c = document.getElementById('busy');
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#4a2a3a';
  ctx.fillRect(0, 0, 128, 128);
  const color = '#dddddd';
  drawBeetle(ctx, 0, 8, 120, color, { wings: true });
})();

// --- Fault ---
(function() {
  const c = document.getElementById('fault');
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#4a1a1a';
  ctx.fillRect(0, 0, 128, 128);
  const color = '#ee3333';
  const { cx, bodyCy, bodyR } = drawBeetle(ctx, 0, 8, 120, color, { flipped: true, eyes: 'x' });
  // 感叹号
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, bodyCy - bodyR * 0.4);
  ctx.lineTo(cx, bodyCy + bodyR * 0.15);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(cx, bodyCy + bodyR * 0.35, 2.5, 0, Math.PI * 2);
  ctx.fill();
})();
</script>
</body>
</html>
