# 阶段 10.3：Rust 固件构建与检查 / Stage 10.3: Rust firmware build and checks
name: Rust

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  RUST_BACKTRACE: 1

jobs:
  test-host:
    name: Test (host / stable)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cargo test

  platform-isolation:
    name: Platform isolation (§14.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check §14.2 patterns
        run: bash scripts/check_platform_isolation.sh

  linux-musl-check:
    # Zig + cargo-zigbuild: ring/rustls need a cross C compiler for musl targets (same strategy as scripts/check_linux_musl.sh fallback).
    name: Linux musl (check + clippy + dep tree)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Install musl targets
        run: |
          rustup target add armv7-unknown-linux-musleabihf
          rustup target add riscv64gc-unknown-linux-musl
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Cargo check (musl, zigbuild)
        run: |
          cargo-zigbuild check --target armv7-unknown-linux-musleabihf
          cargo-zigbuild check --target riscv64gc-unknown-linux-musl
      - name: Cargo check (armv7 musl, no default features)
        run: cargo-zigbuild check --target armv7-unknown-linux-musleabihf --no-default-features
      - name: Assert no esp-idf-svc / embedded-svc in Linux dependency tree
        run: |
          for t in armv7-unknown-linux-musleabihf riscv64gc-unknown-linux-musl; do
            if cargo tree -p beetle --target "$t" | grep -E 'esp-idf-svc|embedded-svc' | grep -q .; then
              echo "FAIL: forbidden crates in tree for $t" >&2
              cargo tree -p beetle --target "$t" | grep -E 'esp-idf-svc|embedded-svc' >&2
              exit 1
            fi
          done
      - name: Clippy (musl, zigbuild)
        run: |
          cargo-zigbuild clippy --target armv7-unknown-linux-musleabihf -- -D warnings
          cargo-zigbuild clippy --target riscv64gc-unknown-linux-musl -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            features: ""
          - name: cli-ota
            features: "cli,ota"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xtensa Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5.2
        with:
          default: true
          targets: xtensa-esp32s3-espidf

      - name: Cache esp-idf and cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/.cargo/registry
            target
          key: esp-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Build (release)
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build --release --target xtensa-esp32s3-espidf
          else
            cargo build --release --target xtensa-esp32s3-espidf --features "${{ matrix.features }}"
          fi

  fmt:
    name: Fmt
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check format
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Xtensa Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5.2
        with:
          default: true
          targets: xtensa-esp32s3-espidf
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/.cargo/registry
            target
          key: esp-clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      - name: Clippy
        run: cargo clippy --release --target xtensa-esp32s3-espidf -- -D warnings
