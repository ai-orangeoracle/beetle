# 外置配置 UI：推送到 main/master 时构建并发布到 GitHub Pages
# Configure UI: build and deploy to GitHub Pages on push to main/master
name: Configure UI (Pages)

on:
  push:
    branches: [main, master]
    paths:
      - 'configure-ui/**'
      - '.github/workflows/configure-ui-pages.yml'
  workflow_dispatch:  # 支持在 Actions 页手动运行

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: configure-ui/package-lock.json

      - name: Install and build
        working-directory: configure-ui
        env:
          # GitHub 项目页 base path: https://<owner>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: configure-ui/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
